apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: langgraph-outdoor-activity-agent
  labels:
    app: langgraph-outdoor-activity-agent
  annotations:
    haproxy.router.openshift.io/timeout: 300s
spec:
  to:
    kind: Service
    name: langgraph-outdoor-activity-agent
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
